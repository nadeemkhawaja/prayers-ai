<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Prayers AI</title>
<meta name="description" content="Live mosque prayer & iqamah times for Murphy/Wylie TX area"/>
<meta name="theme-color" content="#1a5c38"/>

<!-- PWA / iOS -->
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Prayers AI"/>
<meta name="mobile-web-app-capable" content="yes"/>

<!-- Open Graph -->
<meta property="og:title" content="Prayers AI"/>
<meta property="og:description" content="Live mosque prayer & iqamah times — Murphy/Wylie TX"/>
<meta property="og:type" content="website"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark:  #1a5c38;
    --green:       #2d6a4f;
    --green-light: #52b788;
    --green-pale:  #d8f3dc;
    --gold:        #c9a832;
    --gold-light:  #fdf3c0;
    --bg:          #f5fdf7;
    --surface:     #ffffff;
    --border:      #d1e8d8;
    --text:        #1a2e1e;
    --muted:       #5a7060;
    --shadow:      0 2px 12px rgba(0,0,0,.08);
    --radius:      14px;
  }

  .dark {
    --bg:      #0f1f15;
    --surface: #172619;
    --border:  #2a4030;
    --text:    #e8f5eb;
    --muted:   #8ab494;
    --green-pale: #1e3d27;
    --gold-light: #2a2210;
    --shadow:  0 2px 12px rgba(0,0,0,.4);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background .3s, color .3s;
  }

  /* ── Header ── */
  header {
    background: var(--green-dark);
    color: #fff;
    padding: 16px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 960px;
    margin: 0 auto;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon { font-size: 1.6rem; }
  .brand-name { font-size: 1.3rem; font-weight: 700; letter-spacing: .5px; }
  .brand-tagline { font-size: .7rem; opacity: .75; margin-top: 1px; letter-spacing: .3px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn-icon {
    background: rgba(255,255,255,.15);
    border: none;
    border-radius: 8px;
    color: #fff;
    padding: 7px 9px;
    cursor: pointer;
    font-size: .9rem;
    transition: background .2s;
  }
  .btn-icon:hover { background: rgba(255,255,255,.25); }

  /* ── Date Bar ── */
  .date-bar {
    background: var(--green);
    color: #fff;
    text-align: center;
    padding: 8px 16px;
    font-size: .85rem;
  }
  .date-bar .today-label { font-weight: 600; }
  .date-bar .last-updated { opacity: .75; font-size: .75rem; margin-top: 2px; }

  /* ── ZIP search ── */
  .zip-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
  }
  .zip-form {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
  }
  .zip-input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: .85rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  .zip-input:focus { border-color: var(--green-light); }
  .zip-btn {
    background: var(--green-dark);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 7px 16px;
    font-size: .85rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .zip-btn:hover { background: var(--green); }
  .zip-notice {
    max-width: 960px;
    margin: 8px auto 0;
    font-size: .75rem;
    color: var(--muted);
  }

  /* ── Main ── */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 12px 40px;
  }

  /* ── Next Prayer Banner ── */
  .next-banner {
    background: linear-gradient(135deg, var(--gold) 0%, #a07820 100%);
    color: #fff;
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
  }
  .next-banner .next-icon { font-size: 1.5rem; }
  .next-banner .next-label { font-size: .75rem; opacity: .85; text-transform: uppercase; letter-spacing: .5px; }
  .next-banner .next-name { font-size: 1.1rem; font-weight: 700; }
  .next-banner .next-time { font-size: .85rem; opacity: .9; }
  .next-banner .next-countdown {
    margin-left: auto;
    background: rgba(255,255,255,.2);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: .9rem;
    font-weight: 600;
    white-space: nowrap;
  }

  /* ── Jumuah Banner ── */
  .jumuah-banner {
    background: linear-gradient(135deg, #1a5c38 0%, #0d3d24 100%);
    color: #fff;
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
  }
  .jumuah-banner .jb-icon { font-size: 1.4rem; }
  .jumuah-banner .jb-label { font-size: .75rem; opacity: .8; text-transform: uppercase; letter-spacing: .5px; }
  .jumuah-banner .jb-title { font-size: 1rem; font-weight: 700; }

  /* ── Section title ── */
  .section-title {
    font-size: .82rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--green-dark);
    margin: 0 0 8px 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── Matrix Tables ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .matrix-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 500px;
  }

  /* Header row */
  .matrix-table thead tr {
    background: var(--green-dark);
    color: #fff;
  }
  .matrix-table thead th {
    padding: 10px 12px;
    font-size: .75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
    text-align: center;
    white-space: nowrap;
  }
  .matrix-table thead th:first-child {
    text-align: left;
    min-width: 160px;
  }

  /* Next-prayer column highlight */
  .matrix-table thead th.col-next {
    background: var(--gold);
    color: #1a0f00;
  }

  /* Body rows */
  .matrix-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  .matrix-table tbody tr:last-child { border-bottom: none; }
  .matrix-table tbody tr:hover { background: var(--green-pale); }

  /* Mosque name cell */
  .matrix-table td.mosque-cell {
    padding: 11px 12px;
    vertical-align: middle;
  }
  .mosque-name {
    font-weight: 700;
    font-size: .88rem;
    color: var(--text);
    line-height: 1.3;
  }
  .mosque-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .mosque-badge {
    font-size: .6rem;
    padding: 2px 6px;
    border-radius: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-live     { background: #22c55e; color: #052e0a; }
  .badge-hardcoded { background: var(--green-pale); color: var(--green-dark); }
  .badge-fallback { background: #f59e0b; color: #1a0f00; }

  .mosque-links { display: flex; gap: 6px; }
  .mosque-link {
    font-size: .72rem;
    font-weight: 600;
    color: var(--green-dark);
    text-decoration: none;
    padding: 2px 0;
    min-height: 28px;
    display: flex;
    align-items: center;
    gap: 2px;
    -webkit-tap-highlight-color: rgba(0,0,0,.1);
  }
  .mosque-link:hover { text-decoration: underline; }
  .mosque-link + .mosque-link::before {
    content: "·";
    margin-right: 4px;
    color: var(--muted);
  }

  /* Time cells */
  .matrix-table td.time-cell {
    padding: 11px 10px;
    text-align: center;
    font-weight: 700;
    font-size: .9rem;
    color: var(--text);
    white-space: nowrap;
    vertical-align: middle;
  }
  .matrix-table td.time-cell.col-next {
    background: var(--gold-light);
    color: var(--gold);
  }
  .matrix-table td.time-cell .no-time {
    color: var(--muted);
    font-weight: 400;
    font-size: .8rem;
  }

  /* Jumu'ah table — tags inside cells */
  .jum-cell {
    padding: 9px 10px;
    text-align: center;
    vertical-align: middle;
  }
  .jum-tag {
    display: inline-block;
    background: var(--green-dark);
    color: #fff;
    border-radius: 6px;
    padding: 3px 9px;
    font-size: .78rem;
    font-weight: 600;
    margin: 2px 3px;
    white-space: nowrap;
  }
  .jum-empty { color: var(--muted); font-size: .8rem; }

  /* ── Loading / Error ── */
  .state-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .state-msg .state-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .state-msg p { font-size: .9rem; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: var(--bg);
    border-radius: 24px;
    padding: 10px 22px;
    font-size: .85rem;
    z-index: 999;
    transition: transform .3s;
    white-space: nowrap;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 20px 16px 32px;
    color: var(--muted);
    font-size: .75rem;
    max-width: 960px;
    margin: 0 auto;
  }
  footer a { color: var(--green-light); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
  .footer-actions { display: flex; justify-content: center; gap: 10px; margin-bottom: 14px; }
  .btn-pill {
    background: var(--green-dark);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 8px 18px;
    font-size: .8rem;
    cursor: pointer;
    transition: background .2s;
    display: none;
  }
  .btn-pill:hover { background: var(--green); }
  .btn-pill.visible { display: inline-block; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="brand">
      <span class="brand-icon">☪️</span>
      <div>
        <div class="brand-name">Prayers AI</div>
        <div class="brand-tagline">Murphy · Wylie · Plano</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="btnRefresh" title="Refresh" aria-label="Refresh">↻</button>
      <button class="btn-icon" id="btnShare" title="Share" aria-label="Share">⬆</button>
      <button class="btn-icon" id="btnDark" title="Toggle dark mode" aria-label="Dark mode">🌙</button>
    </div>
  </div>
</header>

<div class="zip-bar">
  <div class="zip-form">
    <input class="zip-input" id="zipInput" type="text" inputmode="numeric" maxlength="5" placeholder="Enter ZIP code (e.g. 75094)" aria-label="ZIP code"/>
    <button class="zip-btn" id="zipBtn">Search</button>
  </div>
  <div class="zip-notice" id="zipNotice"></div>
</div>

<div class="date-bar">
  <div class="today-label" id="todayLabel">Loading...</div>
  <div class="last-updated" id="lastUpdated"></div>
</div>

<main>
  <div id="nextBanner"></div>
  <div id="jumuahBanner"></div>
  <div id="prayerSection">
    <div class="state-msg">
      <div class="state-icon">🕌</div>
      <p>Loading prayer times...</p>
    </div>
  </div>
</main>

<footer>
  <div class="footer-actions">
    <button class="btn-pill" id="btnInstall">Install App</button>
  </div>
  <p>Times sourced directly from each mosque · <a href="https://github.com/nadeemkhawaja/prayers-ai" target="_blank">GitHub</a></p>
  <p style="margin-top:4px">Hardcoded times updated manually · Maghrib is approximate</p>
</footer>

<div id="toast"></div>

<script>
const PRAYER_ORDER  = ['fajr','dhuhr','asr','maghrib','isha'];
const PRAYER_LABELS = { fajr:'Fajr', dhuhr:'Dhuhr', asr:'Asr', maghrib:'Maghrib', isha:'Isha' };
const PRAYER_ARABIC = { fajr:'الفجر', dhuhr:'الظهر', asr:'العصر', maghrib:'المغرب', isha:'العشاء' };
const DATA_URL = './data.json';

let mosqueData = null;
let nextPrayer = null;
let countdownInterval = null;
let deferredInstall = null;

// ── Dark mode ──
const dark = () => document.documentElement.classList.contains('dark');
function initDark() {
  if (localStorage.getItem('dark') === '1') document.documentElement.classList.add('dark');
}
document.getElementById('btnDark').addEventListener('click', () => {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('dark', dark() ? '1' : '0');
  document.getElementById('btnDark').textContent = dark() ? '☀️' : '🌙';
});

// ── Time helpers ──
function parseTime(str) {
  if (!str) return null;
  const m = str.trim().match(/^(\d{1,2}):(\d{2})\s*([AP]M)$/i);
  if (!m) return null;
  let h = parseInt(m[1], 10);
  const min = parseInt(m[2], 10);
  const ap = m[3].toUpperCase();
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  const d = new Date();
  d.setHours(h, min, 0, 0);
  return d;
}

function formatCountdown(ms) {
  if (ms <= 0) return 'Now';
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function getIqamah(entry) {
  if (!entry) return null;
  return typeof entry === 'object' ? (entry.iqamah || entry.adhan || null) : entry;
}

// ── Find next prayer across all mosques ──
function findNextPrayer(mosques) {
  const now = new Date();
  let soonest = null;
  for (const mosque of mosques) {
    for (const key of PRAYER_ORDER) {
      const t = parseTime(getIqamah(mosque.prayers?.[key]));
      if (!t) continue;
      const diff = t - now;
      if (diff > 0 && (!soonest || diff < soonest.diff)) {
        soonest = { prayer: key, time: getIqamah(mosque.prayers[key]), mosque: mosque.name, diff };
      }
    }
  }
  return soonest;
}

// Which prayer key is next for the whole app (used to highlight column)
function getNextPrayerKey(mosques) {
  const now = new Date();
  for (const key of PRAYER_ORDER) {
    for (const mosque of mosques) {
      const t = parseTime(getIqamah(mosque.prayers?.[key]));
      if (t && t > now) return key;
    }
  }
  return 'fajr';
}

// ── Render date bar ──
function renderDateBar(data) {
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('todayLabel').textContent =
    `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  document.getElementById('lastUpdated').textContent =
    data.last_updated_display ? `Updated: ${data.last_updated_display}` : '';
}

// ── Render next prayer banner ──
function renderNextBanner(next) {
  const el = document.getElementById('nextBanner');
  if (!next) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="next-banner">
      <span class="next-icon">🕌</span>
      <div>
        <div class="next-label">Next Prayer</div>
        <div class="next-name">${PRAYER_LABELS[next.prayer]}</div>
        <div class="next-time">Iqamah at ${next.time}</div>
      </div>
      <div class="next-countdown" id="countdown">${formatCountdown(next.diff)}</div>
    </div>`;
}

// ── Render Jumu'ah banner (Fridays only) ──
function renderJumuahBanner() {
  const el = document.getElementById('jumuahBanner');
  if (new Date().getDay() !== 5) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="jumuah-banner">
      <span class="jb-icon">🕌</span>
      <div>
        <div class="jb-label">Today is Friday</div>
        <div class="jb-title">Jumu'ah prayer times shown below</div>
      </div>
    </div>`;
}

// ── Render badge ──
function badgeHtml(status) {
  const cls = status === 'live' ? 'badge-live' : status === 'fallback' ? 'badge-fallback' : 'badge-hardcoded';
  const label = status === 'live' ? 'Live' : status === 'fallback' ? 'Cached' : 'Manual';
  return `<span class="mosque-badge ${cls}">${label}</span>`;
}

// ── Render main prayer times table + Jumu'ah table ──
function renderSection(data) {
  const section = document.getElementById('prayerSection');
  if (!data?.mosques?.length) {
    section.innerHTML = `<div class="state-msg"><div class="state-icon">⚠️</div><p>Could not load prayer times.</p></div>`;
    return;
  }

  const mosques = data.mosques;
  const nextKey = getNextPrayerKey(mosques);
  const isFriday = new Date().getDay() === 5;

  // ── Prayer Times Table ──
  const prayerHeaders = PRAYER_ORDER.map(key =>
    `<th class="${key === nextKey ? 'col-next' : ''}">${PRAYER_LABELS[key]}<br><small style="font-weight:400;opacity:.7;font-size:.65rem">${PRAYER_ARABIC[key]}</small></th>`
  ).join('');

  const prayerRows = mosques.map(mosque => {
    const mapQ = encodeURIComponent(mosque.address);
    const timeCells = PRAYER_ORDER.map(key => {
      const t = getIqamah(mosque.prayers?.[key]);
      const isNext = key === nextKey;
      return `<td class="time-cell${isNext ? ' col-next' : ''}">${t ? t : '<span class="no-time">—</span>'}</td>`;
    }).join('');

    return `
      <tr>
        <td class="mosque-cell">
          <div class="mosque-name">${mosque.name}</div>
          <div class="mosque-meta">
            ${badgeHtml(mosque.status)}
            <div class="mosque-links">
              <a class="mosque-link" href="https://maps.google.com/?q=${mapQ}" target="_blank" rel="noopener">📍 Map</a>
              <a class="mosque-link" href="${mosque.website}" target="_blank" rel="noopener">🌐 Website</a>
            </div>
          </div>
        </td>
        ${timeCells}
      </tr>`;
  }).join('');

  // ── Jumu'ah Table ──
  const jumuahRows = mosques.map(mosque => {
    const times = mosque.jumuah || [];
    const tags = times.length
      ? times.map(t => `<span class="jum-tag">${t}</span>`).join('')
      : '<span class="jum-empty">—</span>';
    return `
      <tr>
        <td class="mosque-cell">
          <div class="mosque-name">${mosque.name}</div>
        </td>
        <td class="jum-cell">${tags}${isFriday && times.length ? ' <span style="font-size:.65rem;color:var(--green-dark);font-weight:600">📅 Today</span>' : ''}</td>
      </tr>`;
  }).join('');

  section.innerHTML = `
    <div class="section-title">🕌 Daily Iqamah Times</div>
    <div class="table-wrap">
      <table class="matrix-table">
        <thead>
          <tr>
            <th style="text-align:left">Mosque</th>
            ${prayerHeaders}
          </tr>
        </thead>
        <tbody>${prayerRows}</tbody>
      </table>
    </div>

    <div class="section-title" style="margin-top:8px">🌙 Friday Jumu'ah</div>
    <div class="table-wrap">
      <table class="matrix-table">
        <thead>
          <tr>
            <th style="text-align:left">Mosque</th>
            <th>Jumu'ah Times</th>
          </tr>
        </thead>
        <tbody>${jumuahRows}</tbody>
      </table>
    </div>`;
}

// ── Countdown tick ──
function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    const el = document.getElementById('countdown');
    if (!el || !nextPrayer) return;
    nextPrayer.diff -= 1000;
    el.textContent = formatCountdown(nextPrayer.diff);
    if (nextPrayer.diff <= 0) { clearInterval(countdownInterval); loadData(); }
  }, 1000);
}

// ── Load data ──
async function loadData() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    mosqueData = data;

    renderDateBar(data);
    renderJumuahBanner();

    nextPrayer = findNextPrayer(data.mosques);
    renderNextBanner(nextPrayer);
    if (nextPrayer) startCountdown();

    renderSection(data);
  } catch (err) {
    document.getElementById('prayerSection').innerHTML = `
      <div class="state-msg">
        <div class="state-icon">⚠️</div>
        <p>Could not load prayer times.<br><small>${err.message}</small></p>
      </div>`;
  }
}

// ── Share ──
document.getElementById('btnShare').addEventListener('click', async () => {
  const url = location.href;
  if (navigator.share) {
    try { await navigator.share({ title: 'Prayers AI', text: 'Prayer times for Murphy/Wylie TX mosques', url }); return; } catch {}
  }
  await navigator.clipboard.writeText(url);
  showToast('Link copied!');
});

// ── Refresh ──
document.getElementById('btnRefresh').addEventListener('click', () => {
  const btn = document.getElementById('btnRefresh');
  btn.style.transform = 'rotate(360deg)';
  btn.style.transition = 'transform .5s';
  setTimeout(() => { btn.style.transform = ''; btn.style.transition = ''; }, 500);
  loadData().then(() => showToast('Refreshed'));
});

// ── PWA install ──
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstall = e;
  const btn = document.getElementById('btnInstall');
  btn.classList.add('visible');
  btn.addEventListener('click', async () => {
    if (!deferredInstall) return;
    deferredInstall.prompt();
    const { outcome } = await deferredInstall.userChoice;
    if (outcome === 'accepted') { btn.classList.remove('visible'); deferredInstall = null; }
  });
});

// ── Pull to refresh ──
let touchStartY = 0;
document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 70 && window.scrollY === 0) { loadData().then(() => showToast('Refreshed')); }
}, { passive: true });

// ── Toast ──
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── ZIP search ──
const LOCAL_ZIPS = new Set(['75094','75098','75074','75023','75075','75025','75024']);
function handleZip() {
  const zip = document.getElementById('zipInput').value.trim();
  const notice = document.getElementById('zipNotice');
  if (!zip || zip.length < 5) { notice.textContent = ''; return; }
  if (LOCAL_ZIPS.has(zip)) {
    notice.style.color = 'var(--green-light)';
    notice.textContent = `✓ Showing local mosques for ${zip} area`;
    loadData();
  } else {
    notice.style.color = 'var(--gold)';
    notice.textContent = `⚠ ZIP ${zip} is outside the Murphy/Wylie/Plano area — showing local mosques.`;
  }
}
document.getElementById('zipBtn').addEventListener('click', handleZip);
document.getElementById('zipInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleZip(); });

// ── Init ──
initDark();
loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
